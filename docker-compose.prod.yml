services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calculator-fastapi-app
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calculator-nextjs-app
    depends_on:
      - api
    ports:
      - "3001:3000"
    env_file:
      - .env
    restart: always

  postgres:
    image: 'postgres:17'
    container_name: postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
